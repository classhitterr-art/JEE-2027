<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JEE Command Center — AIR &lt;1000</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #020408;
    --surface: rgba(10,20,35,0.85);
    --surface2: rgba(5,15,28,0.9);
    --border: rgba(0,180,255,0.18);
    --accent: #00b4ff;
    --accent2: #ff4e50;
    --accent3: #00ffaa;
    --accent4: #ffd700;
    --text: #cde8ff;
    --muted: #4a7a9b;
    --glow: 0 0 20px rgba(0,180,255,0.35);
    --glow2: 0 0 20px rgba(255,78,80,0.3);
    --glow3: 0 0 20px rgba(0,255,170,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
    animation: gridShift 20s linear infinite;
  }

  @keyframes gridShift {
    0% { background-position: 0 0; }
    100% { background-position: 50px 50px; }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(0,100,200,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,200,150,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(200,50,50,0.05) 0%, transparent 50%);
    z-index: 0;
    pointer-events: none;
  }

  .app { position: relative; z-index: 1; padding: 16px; max-width: 1400px; margin: 0 auto; }

  /* ─── GLASS CARD ─── */
  .glass {
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .glass-dark {
    background: var(--surface2);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0,180,255,0.1);
    border-radius: 8px;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent3), transparent);
    animation: scanline 3s linear infinite;
  }

  @keyframes scanline {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }

  .logo span {
    font-size: 11px;
    font-weight: 400;
    display: block;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--muted), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-top: 2px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
    padding: 6px 14px;
    border: 1px solid rgba(0,255,170,0.25);
    border-radius: 4px;
    background: rgba(0,255,170,0.05);
  }

  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ─── COUNTDOWN ─── */
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .countdown-unit {
    text-align: center;
    padding: 20px 10px;
    position: relative;
    overflow: hidden;
  }

  .countdown-unit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,180,255,0.06), transparent);
  }

  .countdown-num {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: var(--glow);
    line-height: 1;
    display: block;
  }

  .countdown-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-top: 8px;
    text-transform: uppercase;
  }

  .countdown-sep {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 32px;
    color: var(--accent);
    opacity: 0.4;
  }

  /* ─── SECTION TITLES ─── */
  .sec-title {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .sec-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ─── FIREPOWER ─── */
  .subject-card {
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
  }

  .subject-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .subject-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .pb-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  .pb-phy { background: rgba(0,180,255,0.15); color: var(--accent); border: 1px solid rgba(0,180,255,0.3); }
  .pb-chem { background: rgba(0,255,170,0.1); color: var(--accent3); border: 1px solid rgba(0,255,170,0.25); }
  .pb-math { background: rgba(255,215,0,0.1); color: var(--accent4); border: 1px solid rgba(255,215,0,0.25); }

  .subject-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .qty-input {
    font-family: 'Share Tech Mono', monospace;
    width: 80px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .qty-input:focus { border-color: var(--accent); box-shadow: var(--glow); }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0077b6);
    color: #fff;
    box-shadow: 0 0 14px rgba(0,180,255,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 22px rgba(0,180,255,0.5); }

  .btn-green {
    background: linear-gradient(135deg, var(--accent3), #00a87a);
    color: #001a10;
  }
  .btn-green:hover { transform: translateY(-1px); box-shadow: var(--glow3); }

  .btn-gold {
    background: linear-gradient(135deg, var(--accent4), #e6a800);
    color: #1a0f00;
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 0 18px rgba(255,215,0,0.4); }

  .btn-danger {
    background: rgba(255,78,80,0.1);
    color: var(--accent2);
    border: 1px solid rgba(255,78,80,0.3);
    padding: 4px 10px;
    font-size: 11px;
  }
  .btn-danger:hover { background: rgba(255,78,80,0.2); }

  .btn-sm {
    padding: 5px 12px;
    font-size: 12px;
  }

  .progress-bar {
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.06);
    margin-top: 12px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .total-today {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    padding: 10px;
  }

  /* ─── TASK MANAGER ─── */
  .task-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .task-input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .task-input:focus { border-color: var(--accent); }
  .task-input::placeholder { color: var(--muted); }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 6px;
    border-radius: 6px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(0,180,255,0.08);
    transition: all 0.2s;
  }

  .task-item:hover { border-color: rgba(0,180,255,0.2); }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-check {
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1px solid var(--muted);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    flex-shrink: 0;
    position: relative;
    transition: all 0.2s;
  }

  .task-check:checked {
    background: var(--accent3);
    border-color: var(--accent3);
    box-shadow: 0 0 8px rgba(0,255,170,0.4);
  }

  .task-check:checked::after {
    content: '✓';
    position: absolute;
    top: -1px; left: 2px;
    font-size: 11px;
    color: #001a10;
    font-weight: 900;
  }

  .task-text { flex: 1; font-size: 14px; }

  .task-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  .tag-phy { background: rgba(0,180,255,0.12); color: var(--accent); }
  .tag-chem { background: rgba(0,255,170,0.1); color: var(--accent3); }
  .tag-math { background: rgba(255,215,0,0.1); color: var(--accent4); }
  .tag-gen { background: rgba(255,255,255,0.06); color: var(--muted); }

  /* ─── COMPLETION RING ─── */
  .ring-container { position: relative; width: 100px; height: 100px; margin: 0 auto; }

  .ring-svg { transform: rotate(-90deg); }

  .ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 6; }
  .ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }

  .ring-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .ring-pct {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
  }

  .ring-sub { font-size: 9px; letter-spacing: 2px; color: var(--muted); }

  /* ─── QUOTE BAR ─── */
  .quote-bar {
    padding: 14px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-left: 3px solid var(--accent2);
  }

  .quote-icon { font-size: 20px; flex-shrink: 0; }

  .quote-text {
    font-size: 14px;
    font-style: italic;
    line-height: 1.5;
    color: rgba(205,232,255,0.8);
  }

  /* ─── STATS ROW ─── */
  .stat-box {
    padding: 14px 18px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 700;
    display: block;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* ─── LOG ─── */
  .log-entry {
    padding: 6px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border-left: 2px solid rgba(0,180,255,0.15);
    margin-bottom: 4px;
  }

  .log-entry span { color: var(--accent3); }

  /* ─── LAYOUT ─── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .full-col { grid-column: 1 / -1; }

  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .countdown-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .full-col { grid-column: 1; }
  }

  /* ─── SELECT ─── */
  .tag-select {
    padding: 8px 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  /* ─── STREAK ─── */
  .streak-flame {
    font-size: 24px;
    animation: flicker 1s ease-in-out infinite alternate;
  }

  @keyframes flicker {
    0% { text-shadow: 0 0 10px orange; }
    100% { text-shadow: 0 0 20px red, 0 0 40px orange; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,180,255,0.3); border-radius: 2px; }

  .reset-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    background: rgba(255,78,80,0.08);
    border: 1px solid rgba(255,78,80,0.2);
    color: var(--accent2);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: rgba(255,78,80,0.18); }

  .hr { height: 1px; background: var(--border); margin: 14px 0; }
</style>
</head>
<body>

<div class="app" x-data="commandCenter()" x-init="init()">

  <!-- ─── HEADER ─── -->
  <div class="glass header">
    <div class="logo">
      JEE COMMAND CENTER
      <span>AIR &lt; 1000 · ADVANCED 2027</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="status-badge">
        <div class="pulse-dot"></div>
        SYSTEMS ONLINE
      </div>
      <div class="status-badge" style="color:var(--accent4);border-color:rgba(255,215,0,0.25);background:rgba(255,215,0,0.05);">
        <span class="streak-flame">🔥</span>
        DAY <span x-text="streak" style="margin-left:3px"></span>
      </div>
    </div>
  </div>

  <!-- ─── QUOTE ─── -->
  <div class="glass quote-bar" style="margin-bottom:16px">
    <div class="quote-icon">⚡</div>
    <div class="quote-text" x-text="currentQuote"></div>
  </div>

  <!-- ─── COUNTDOWN ─── -->
  <div class="glass full-col" style="padding:20px 24px;margin-bottom:16px">
    <div class="sec-title">🎯 MISSION COUNTDOWN — JAN 20, 2027</div>
    <div class="countdown-grid">
      <div class="glass-dark countdown-unit">
        <span class="countdown-num" x-text="countdown.days"></span>
        <div class="countdown-label">DAYS</div>
      </div>
      <div class="glass-dark countdown-unit">
        <span class="countdown-num" x-text="countdown.hours" style="color:var(--accent3);text-shadow:var(--glow3)"></span>
        <div class="countdown-label">HOURS</div>
      </div>
      <div class="glass-dark countdown-unit">
        <span class="countdown-num" x-text="countdown.minutes" style="color:var(--accent4);text-shadow:0 0 20px rgba(255,215,0,0.4)"></span>
        <div class="countdown-label">MINUTES</div>
      </div>
      <div class="glass-dark countdown-unit">
        <span class="countdown-num" x-text="countdown.seconds" style="color:var(--accent2);text-shadow:var(--glow2)"></span>
        <div class="countdown-label">SECONDS</div>
      </div>
    </div>
    <div style="margin-top:14px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)">
      COMMANDER — <span x-text="countdown.totalDays" style="color:var(--accent)"></span> TOTAL DAYS REMAIN · EVERY SECOND IS A WEAPON
    </div>
  </div>

  <!-- ─── MAIN GRID ─── -->
  <div class="main-grid">

    <!-- ─── DAILY FIREPOWER ─── -->
    <div class="glass" style="padding:20px 22px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="sec-title" style="margin-bottom:0">⚡ DAILY FIREPOWER</div>
        <button class="reset-btn" @click="resetDailyFirepower()">RESET DAY</button>
      </div>

      <!-- Physics -->
      <div class="glass-dark subject-card" style="border-left:3px solid var(--accent)">
        <div class="subject-header">
          <div class="subject-name" style="color:var(--accent)">⚛ PHYSICS</div>
          <div class="pb-badge pb-phy">PB: <span x-text="pb.physics"></span> Qs</div>
        </div>
        <div class="subject-input-row">
          <input type="number" class="qty-input" x-model.number="inputs.physics" placeholder="0" min="0"/>
          <button class="btn btn-primary btn-sm" @click="logQuestions('physics')">LOG</button>
          <span style="font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent);margin-left:auto" x-text="daily.physics"></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="background:linear-gradient(90deg,var(--accent),var(--accent3))" :style="{width: Math.min((daily.physics/targetQ)*100,100)+'%'}"></div>
        </div>
      </div>

      <!-- Chemistry -->
      <div class="glass-dark subject-card" style="border-left:3px solid var(--accent3)">
        <div class="subject-header">
          <div class="subject-name" style="color:var(--accent3)">🧪 ORG. CHEMISTRY</div>
          <div class="pb-badge pb-chem">PB: <span x-text="pb.chemistry"></span> Qs</div>
        </div>
        <div class="subject-input-row">
          <input type="number" class="qty-input" x-model.number="inputs.chemistry" placeholder="0" min="0"/>
          <button class="btn btn-green btn-sm" @click="logQuestions('chemistry')">LOG</button>
          <span style="font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent3);margin-left:auto" x-text="daily.chemistry"></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="background:linear-gradient(90deg,var(--accent3),#00b8d9)" :style="{width: Math.min((daily.chemistry/targetQ)*100,100)+'%'}"></div>
        </div>
      </div>

      <!-- Maths -->
      <div class="glass-dark subject-card" style="border-left:3px solid var(--accent4)">
        <div class="subject-header">
          <div class="subject-name" style="color:var(--accent4)">∫ CALCULUS / MATHS</div>
          <div class="pb-badge pb-math">PB: <span x-text="pb.maths"></span> Qs</div>
        </div>
        <div class="subject-input-row">
          <input type="number" class="qty-input" x-model.number="inputs.maths" placeholder="0" min="0"/>
          <button class="btn btn-gold btn-sm" @click="logQuestions('maths')">LOG</button>
          <span style="font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent4);margin-left:auto" x-text="daily.maths"></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="background:linear-gradient(90deg,var(--accent4),#ff9500)" :style="{width: Math.min((daily.maths/targetQ)*100,100)+'%'}"></div>
        </div>
      </div>

      <!-- Total today -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 4px">
        <div>
          <div class="total-today" style="color:var(--accent);text-shadow:var(--glow)" x-text="totalToday"></div>
          <div style="text-align:center;font-size:10px;letter-spacing:2px;color:var(--muted)">QUESTIONS TODAY</div>
        </div>
        <div>
          <div class="total-today" style="color:var(--accent4);text-shadow:0 0 18px rgba(255,215,0,0.35)" x-text="cumulative.total"></div>
          <div style="text-align:center;font-size:10px;letter-spacing:2px;color:var(--mu
